# ============================================================
# docker-compose.yml
# Stack completo del sistema de biblioteca
# - MySQL con 11 bases de datos (una por microservicio)
# - Eureka Server (service discovery)
# - API Gateway (punto de entrada unico, puerto 8080)
# - 11 microservicios de dominio
# ============================================================
#
# IMPORTANTE - Registro en Eureka desde Docker:
# Por defecto los MS usan `eureka.instance.prefer-ip-address: true`,
# que en Docker suele registrar una IP que otros contenedores NO
# pueden resolver (a veces 127.0.0.1). Para evitarlo, forzamos a
# cada MS a registrarse con su HOSTNAME (que coincide con el
# service name de docker-compose y es resoluble por Docker DNS).
# Tambien forzamos `hostname:` en cada servicio para que
# `InetAddress.getLocalHost()` devuelva el service name.
# ============================================================

name: biblioteca

# Anchor comun: config Eureka que se aplica a todos los MS
# (desactivamos prefer-ip-address para que se use el hostname)
x-ms-eureka: &ms-eureka
  EUREKA_INSTANCE_PREFER_IP_ADDRESS: "false"

services:

  # -----------------------------------------------------------
  # MySQL: un solo contenedor que aloja las 11 bases de datos
  # -----------------------------------------------------------
  mysql:
    image: mysql:8.0
    container_name: biblioteca-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    command:
      - --default-authentication-plugin=caching_sha2_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "3306:3306"
    healthcheck:
      # Verifica que MySQL responde Y que la base ms_usuarios existe
      # (es la ultima en crearse en init.sql, asi que confirma que
      # el script completo se ejecuto)
      test:
        - "CMD-SHELL"
        - "mysql -h 127.0.0.1 -uroot -p${MYSQL_ROOT_PASSWORD} -e 'SHOW DATABASES' | grep -q ms_usuarios"
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 60s
    networks:
      - biblioteca-net

  # -----------------------------------------------------------
  # Eureka Server
  # -----------------------------------------------------------
  eureka-server:
    build:
      context: ./eureka-server
    image: biblioteca/eureka-server:latest
    container_name: biblioteca-eureka
    hostname: eureka-server
    restart: unless-stopped
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health 2>/dev/null | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - biblioteca-net

  # -----------------------------------------------------------
  # Microservicio: ms-usuarios  (puerto 8081, db: ms_usuarios)
  # -----------------------------------------------------------
  ms-usuarios:
    build:
      context: ./ms-usuarios
    image: biblioteca/ms-usuarios:latest
    container_name: biblioteca-ms-usuarios
    hostname: ms-usuarios
    restart: unless-stopped
    environment:
      <<: *ms-eureka
      SPRING_PROFILES_ACTIVE: prod
      EUREKA_URL: ${EUREKA_URL}
      EUREKA_INSTANCE_HOSTNAME: ms-usuarios
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ms_usuarios
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health 2>/dev/null | grep -q '\"status\":\"UP\"' || exit 1"]
