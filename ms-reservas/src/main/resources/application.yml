server:
  port: 8089

spring:
  application:
    name: ms-reservas
  datasource:
    url: jdbc:h2:mem:reservasdb
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}
  instance:
    preferIpAddress: true

ms:
  usuarios:
    url: ${MS_USUARIOS_URL:http://localhost:8081}
  libros:
    url: ${MS_LIBROS_URL:http://localhost:8085}
  ejemplares:
    url: ${MS_EJEMPLARES_URL:http://localhost:8086}

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: "jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:ms_reservas}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true"
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
